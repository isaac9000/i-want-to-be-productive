<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZZZZZZZZ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      max-width: 420px;
      padding: 40px 32px;
      width: 100%;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { color: #888; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
    .site {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 14px;
      color: #e55;
      margin-bottom: 28px;
      word-break: break-all;
    }
    .redirect-wrap {
      display: none;
      margin-bottom: 20px;
    }
    .redirect-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .redirect-label span {
      font-size: 12px;
      color: #666;
    }
    .redirect-label .redirect-timer {
      font-size: 13px;
      font-weight: 700;
      color: #e55;
      font-variant-numeric: tabular-nums;
    }
    .progress-track {
      width: 100%;
      background: #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
      height: 4px;
    }
    .progress-bar {
      height: 100%;
      width: 100%;
      background: #e55;
      border-radius: 4px;
      transition: width 2s linear;
    }
    button {
      padding: 10px 24px;
      background: #e55;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c33; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🗣️</div>
    <h1>ANTI-CHUD</h1>
    <p>You are a CHUD!! You can unblock it from the extension popup.</p>
    <div id="url" class="site" style="display:none"></div>
    <div class="redirect-wrap" id="redirectWrap">
      <div class="redirect-label">
        <span>Redirecting…</span>
        <span class="redirect-timer" id="redirectTimer">2s</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <button id="backBtn">Go Back</button>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
