<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZZZZZZZZ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      max-width: 420px;
      padding: 40px 32px;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { color: #888; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
    .site {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 14px;
      color: #e55;
      margin-bottom: 28px;
      word-break: break-all;
    }
    button {
      padding: 10px 24px;
      background: #e55;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c33; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🗣️</div>
    <h1>ANTI-CHUD</h1>
    <p>You are a CHUD. You can unblock it from the extension popup.</p>
    <button onclick="history.back()">Go Back</button>
  </div>
  <script>
  const urlEl = document.getElementById("url");
  const ref = document.referrer;
  if (ref) {
    urlEl.textContent = ref;
  } else {
    urlEl.style.display = "none";
  }

  function goBack() {
    if (history.length > 1) {
      history.back();
    } else {
      window.close();
    }
  }
  </script>
</body>
</html>
