<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YOU ARE A CHUD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      width: 300px;
      padding: 16px;
      background: #0f0f0f;
      color: #f1f1f1;
    }
    h1 { font-size: 16px; margin-bottom: 12px; color: #fff; }
    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #f1f1f1;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #e55; }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #e55;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover { background: #c33; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
    }
    li span { flex: 1; word-break: break-all; }
    li .remove {
      background: none;
      color: #888;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    li .remove:hover { color: #e55; background: none; }
    .empty { font-size: 12px; color: #555; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>
  <h1>ZZZZZZZZZZ</h1>
  <div class="input-row">
    <input id="siteInput" type="text" placeholder="youtube.com" />
    <button id="addBtn">Block</button>
  </div>
  <ul id="list"></ul>
  <p class="empty" id="empty" style="display:none">No sites blocked yet.</p>
  <script src="popup.js"></script>
</body>
</html>
