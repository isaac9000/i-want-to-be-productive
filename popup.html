<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YOU ARE A CHUD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      width: 300px;
      padding: 16px;
      background: #0f0f0f;
      color: #f1f1f1;
    }
    h1 { font-size: 16px; margin-bottom: 12px; color: #fff; }
    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    input[type="text"] {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #f1f1f1;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #e55; }
    input[type="text"]:disabled { opacity: 0.4; cursor: not-allowed; }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #e55;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover { background: #c33; }

    /* Blocklist */
    ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
    }
    .li-main {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }
    .domain { word-break: break-all; color: #f1f1f1; }
    .days-badge { font-size: 11px; color: #888; }

    li .remove {
      background: none;
      color: #555;
      font-size: 16px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    li .remove:hover { color: #e55; background: none; }

    .empty { font-size: 12px; color: #555; text-align: center; padding: 12px 0; }

    /* Divider */
    .section-divider { border: none; border-top: 1px solid #222; margin: 14px 0; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 10px;
    }

    /* Redirect */
    .redirect-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .redirect-label { font-size: 13px; color: #ccc; }
    .redirect-status {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .redirect-status.on  { background: #1a3a1a; color: #4c4; }
    .redirect-status.off { background: #2a1a1a; color: #e55; }

    /* Toggle */
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .slider { background: #2a2a2a; }
    .toggle input:checked + .slider::before { transform: translateX(16px); background: #e55; }

    /* Confirm modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px 18px;
      width: 240px;
      text-align: center;
    }
    .modal-box .modal-title {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .modal-box .modal-domain {
      font-size: 12px;
      color: #e55;
      word-break: break-all;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 5px 10px;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
    }
    .modal-actions button {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      border-radius: 6px;
    }
    .modal-cancel {
      background: #2a2a2a !important;
      color: #aaa !important;
    }
    .modal-cancel:hover { background: #333 !important; }
    .modal-confirm { background: #e55 !important; }
    .modal-confirm:hover { background: #c33 !important; }
  </style>
</head>
<body>
  <h1>ZZZZZZZZZZ</h1>
  <div class="input-row">
    <input id="siteInput" type="text" placeholder="youtube.com" />
    <button id="addBtn">Block</button>
  </div>
  <ul id="list"></ul>
  <p class="empty" id="empty" style="display:none">No sites blocked yet.</p>

  <hr class="section-divider" />

  <p class="section-label">Custom Redirect</p>
  <div class="redirect-row">
    <span class="redirect-label">
      Redirect to URL
      <span id="redirectStatus" class="redirect-status off">OFF</span>
    </span>
    <label class="toggle">
      <input type="checkbox" id="redirectToggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="input-row">
    <input type="text" id="redirectUrl" placeholder="https://example.com" disabled />
  </div>

  <!-- Confirmation modal -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal-box">
      <div class="modal-title">Gave up LOL?</div>
      <div class="modal-domain" id="confirmDomain"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="confirmNo">Nah I'd Win</button>
        <button class="modal-confirm" id="confirmYes">I am a FAT CHUD</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
